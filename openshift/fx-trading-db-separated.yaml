apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-core-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-core-db
  template:
    metadata:
      labels:
        app: fx-core-db
    spec:
      containers:
        - name: postgres
          image: image-registry.openshift-image-registry.svc:5000/fx-trading-sample/fx-postgres:latest
          imagePullPolicy: Always
          args:
            - -c
            - max_connections=160
            - -c
            - log_lock_waits=on
            - -c
            - deadlock_timeout=100ms
          env:
            - name: POSTGRES_DB
              value: fx_trading
            - name: POSTGRES_USER
              value: fx
            - name: POSTGRES_PASSWORD
              value: fx
            - name: PGDATA
              value: /tmp/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          startupProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5432
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /tmp/pgdata
      volumes:
        - name: initdb
          configMap:
            name: fx-postgres-init
        - name: data
          persistentVolumeClaim:
            claimName: fx-core-db-data
---
