    spec:
      containers:
        - name: accounting-service
          env:
            - name: DB_HOST
              value: fx-accounting-db
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: fx_trading
            - name: DB_USER
              value: fx
            - name: DB_PASSWORD
              value: fx
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fx-kafka:9092
            - name: SERVER_PORT
              value: "8084"
            - name: OUTBOX_POLL_PERIOD_MS
              value: "50"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://fx-tempo:4318/v1/traces
            - name: LOKI_URL
              value: http://fx-loki:3100/loki/api/v1/push
            - name: ACTIVITY_DB_URL
              value: jdbc:postgresql://fx-trade-saga-db:5432/fx_trading
            - name: ACTIVITY_DB_USERNAME
              value: fx
            - name: ACTIVITY_DB_PASSWORD
              value: fx
            - name: ACTIVITY_DB_POOL_MAX_SIZE
              value: "5"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
