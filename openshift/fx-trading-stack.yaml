              value: fx
            - name: DB_PASSWORD
              value: fx
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: fx-kafka:9092
            - name: SERVER_PORT
              value: "8080"
            - name: OUTBOX_POLL_PERIOD_MS
              value: "100"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://fx-tempo:4318/v1/traces
            - name: LOKI_URL
              value: http://fx-loki:3100/loki/api/v1/push
          ports:
            - containerPort: 8080
              name: http
