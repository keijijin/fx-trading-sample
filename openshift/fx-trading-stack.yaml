apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-postgres
  template:
    metadata:
      labels:
        app: fx-postgres
    spec:
      containers:
        - name: postgres
          image: image-registry.openshift-image-registry.svc:5000/fx-trading-sample/fx-postgres:latest
          imagePullPolicy: Always
          env:
            - name: POSTGRES_DB
              value: fx_trading
            - name: POSTGRES_USER
              value: fx
            - name: POSTGRES_PASSWORD
              value: fx
            - name: PGDATA
              value: /tmp/pgdata
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: initdb
          configMap:
            name: fx-postgres-init
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fx-kafka
spec:
  serviceName: fx-kafka-headless
  replicas: 3
  selector:
    matchLabels:
      app: fx-kafka
  template:
    metadata:
      labels:
        app: fx-kafka
    spec:
      containers:
        - name: kafka
          image: image-registry.openshift-image-registry.svc:5000/fx-trading-sample/fx-kafka:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              export KAFKA_NODE_ID="${HOSTNAME##*-}"
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${HOSTNAME}.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9092"
              export KAFKA_CONTROLLER_QUORUM_VOTERS="0@fx-kafka-0.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9093,1@fx-kafka-1.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9093,2@fx-kafka-2.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9093"
              exec /etc/kafka/docker/run
          env:
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_NUM_PARTITIONS
              value: "12"
            - name: KAFKA_LOG_DIRS
              value: /tmp/kraft-combined-logs
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          volumeMounts:
            - name: kafka-data
              mountPath: /tmp/kraft-combined-logs
      volumes:
        - name: kafka-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-core-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-core-service
