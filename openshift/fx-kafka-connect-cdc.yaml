apiVersion: v1
kind: ConfigMap
metadata:
  name: fx-kafka-connect-config
data:
  connector-config.json: |
    {
      "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
      "database.hostname": "fx-postgres",
      "database.port": "5432",
      "database.user": "fx",
      "database.password": "fx",
      "database.dbname": "fx_trading",
      "database.server.name": "fx-core-db",
      "topic.prefix": "fx-core-cdc",
      "schema.include.list": "public",
      "table.include.list": "public.outbox_event",
      "plugin.name": "pgoutput",
      "publication.autocreate.mode": "filtered",
      "slot.name": "fx_core_outbox_slot",
      "decimal.handling.mode": "string",
      "tombstones.on.delete": "false",
      "transforms": "outbox",
      "transforms.outbox.type": "io.debezium.transforms.outbox.EventRouter",
      "transforms.outbox.route.by.field": "topic_name",
      "transforms.outbox.route.topic.replacement": "shadow.${routedByValue}",
      "transforms.outbox.table.field.event.id": "event_id",
      "transforms.outbox.table.field.event.key": "message_key",
      "transforms.outbox.table.field.event.payload": "payload",
      "transforms.outbox.table.fields.additional.placement": "correlation_id:header:event-correlation-id,event_type:header:event-type,aggregate_type:header:aggregate-type,aggregate_id:header:aggregate-id,source_service:header:source-service"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: fx-kafka-connect
spec:
  selector:
    app: fx-kafka-connect
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fx-kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fx-kafka-connect
  template:
    metadata:
      labels:
        app: fx-kafka-connect
    spec:
      containers:
        - name: kafka-connect
          image: quay.io/debezium/connect:2.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: BOOTSTRAP_SERVERS
              value: fx-kafka:9092
            - name: GROUP_ID
              value: fx-kafka-connect
            - name: CONFIG_STORAGE_TOPIC
              value: fx-connect-configs
            - name: OFFSET_STORAGE_TOPIC
              value: fx-connect-offsets
            - name: STATUS_STORAGE_TOPIC
              value: fx-connect-status
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: fx-kafka-connect
          startupProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes: []
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fx-kafka-connect-register
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: register-connector
          image: curlimages/curl:8.11.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              for attempt in $(seq 1 60); do
                if curl -sf http://fx-kafka-connect:8083/connectors >/dev/null; then
                  break
                fi
                sleep 5
              done
              curl -sf -X PUT \
                -H 'Content-Type: application/json' \
                --data @/config/connector-config.json \
                http://fx-kafka-connect:8083/connectors/fx-core-outbox-connector/config
          volumeMounts:
            - name: connector-config
              mountPath: /config
      volumes:
        - name: connector-config
          configMap:
            name: fx-kafka-connect-config
