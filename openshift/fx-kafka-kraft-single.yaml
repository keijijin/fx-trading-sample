# 単一ノード / 小規模クラスタ向け: OrderedReady 3 レプリカ KRaft は Pod 1 DNS 未登録で
# fx-kafka-0 が起動できないため、開発・検証用に 1 broker のみ構成にする。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fx-kafka
spec:
  serviceName: fx-kafka-headless
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: fx-kafka
  template:
    metadata:
      labels:
        app: fx-kafka
    spec:
      containers:
        - name: kafka
          image: image-registry.openshift-image-registry.svc:5000/fx-trading-sample/fx-kafka:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              export KAFKA_NODE_ID=0
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://fx-kafka-0.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9092"
              export KAFKA_CONTROLLER_QUORUM_VOTERS="0@fx-kafka-0.fx-kafka-headless.fx-trading-sample.svc.cluster.local:9093"
              exec /etc/kafka/docker/run
          env:
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: "6"
            - name: KAFKA_LOG_DIRS
              value: /tmp/kraft-combined-logs/data
          ports:
            - containerPort: 9092
              name: client
            - containerPort: 9093
              name: controller
          startupProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9092
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: kafka-data
              mountPath: /tmp/kraft-combined-logs
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
